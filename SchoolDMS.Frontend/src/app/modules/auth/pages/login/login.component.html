<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 tracking-tight">
        SchoolDMS
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        Sign in to your account
      </p>
    </div>
    
    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
          <input id="email" type="email" formControlName="email" class="mt-1 input" placeholder="name@example.com"
            [ngClass]="{ 'border-red-500': f['email'].errors && (f['email'].dirty || f['email'].touched) }">
          <div *ngIf="f['email'].errors && (f['email'].dirty || f['email'].touched)" class="text-red-500 text-xs mt-1">
            <div *ngIf="f['email'].errors['required']">Email is required</div>
            <div *ngIf="f['email'].errors['email']">Must be a valid email address</div>
          </div>
        </div>
        
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input id="password" type="password" formControlName="password" class="mt-1 input" placeholder="••••••••"
            [ngClass]="{ 'border-red-500': f['password'].errors && (f['password'].dirty || f['password'].touched) }">
          <div *ngIf="f['password'].errors && (f['password'].dirty || f['password'].touched)" class="text-red-500 text-xs mt-1">
            <div *ngIf="f['password'].errors['required']">Password is required</div>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="rememberMe" type="checkbox" formControlName="rememberMe" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
          <label for="rememberMe" class="ml-2 block text-sm text-gray-900">
            Remember me
          </label>
        </div>

        <div class="text-sm">
          <a routerLink="/auth/forgot-password" class="font-medium text-primary hover:text-primary/80">
            Forgot your password?
          </a>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loginForm.invalid || isLoading" class="w-full btn btn-primary flex justify-center">
          <span *ngIf="!isLoading">Sign in</span>
          <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </div>
      
      <div class="mt-4 text-center text-sm">
        <p class="text-gray-600">Don't have an account? 
          <a routerLink="/auth/register" class="font-medium text-primary hover:text-primary/80">Sign up</a>
        </p>
      </div>
    </form>
  </div>
</div>
