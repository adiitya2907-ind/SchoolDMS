<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 tracking-tight">
        Create an account
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        Join SchoolDMS as an Engineer
      </p>
    </div>
    
    <form class="mt-8 space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="firstName" class="block text-sm font-medium text-gray-700">First Name</label>
            <input id="firstName" type="text" formControlName="firstName" class="mt-1 input"
              [ngClass]="{ 'border-red-500': f['firstName'].errors && (f['firstName'].dirty || f['firstName'].touched) }">
          </div>
          <div>
            <label for="lastName" class="block text-sm font-medium text-gray-700">Last Name</label>
            <input id="lastName" type="text" formControlName="lastName" class="mt-1 input"
              [ngClass]="{ 'border-red-500': f['lastName'].errors && (f['lastName'].dirty || f['lastName'].touched) }">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
          <input id="email" type="email" formControlName="email" class="mt-1 input"
            [ngClass]="{ 'border-red-500': f['email'].errors && (f['email'].dirty || f['email'].touched) }">
          <div *ngIf="f['email'].errors && (f['email'].dirty || f['email'].touched)" class="text-red-500 text-xs mt-1">
            <div *ngIf="f['email'].errors['required']">Email is required</div>
            <div *ngIf="f['email'].errors['email']">Must be a valid email address</div>
          </div>
        </div>
        
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input id="password" type="password" formControlName="password" class="mt-1 input"
            [ngClass]="{ 'border-red-500': f['password'].errors && (f['password'].dirty || f['password'].touched) }">
          <div *ngIf="f['password'].errors && (f['password'].dirty || f['password'].touched)" class="text-red-500 text-xs mt-1">
            <div *ngIf="f['password'].errors['required']">Password is required</div>
            <div *ngIf="f['password'].errors['minlength']">Minimum 6 characters</div>
          </div>
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
          <input id="confirmPassword" type="password" formControlName="confirmPassword" class="mt-1 input"
            [ngClass]="{ 'border-red-500': (f['confirmPassword'].errors || registerForm.hasError('notSame')) && (f['confirmPassword'].dirty || f['confirmPassword'].touched) }">
          <div *ngIf="(f['confirmPassword'].errors || registerForm.hasError('notSame')) && (f['confirmPassword'].dirty || f['confirmPassword'].touched)" class="text-red-500 text-xs mt-1">
            <div *ngIf="registerForm.hasError('notSame')">Passwords do not match</div>
          </div>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="registerForm.invalid || isLoading" class="w-full btn btn-primary flex justify-center">
          <span *ngIf="!isLoading">Register</span>
          <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </div>
      
      <div class="mt-4 text-center text-sm">
        <p class="text-gray-600">Already have an account? 
          <a routerLink="/auth/login" class="font-medium text-primary hover:text-primary/80">Sign in</a>
        </p>
      </div>
    </form>
  </div>
</div>
