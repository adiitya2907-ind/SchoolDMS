<nav class="bg-white border-b border-gray-200 fixed w-full z-30 top-0 left-0">
  <div class="px-3 py-3 lg:px-5 lg:pl-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center justify-start">
        <button (click)="toggleMenu()" class="lg:hidden p-2 text-gray-600 rounded cursor-pointer hover:text-gray-900 hover:bg-gray-100 focus:bg-gray-100 focus:ring-2 focus:ring-gray-100">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"></path>
          </svg>
        </button>
        <a routerLink="/" class="text-xl font-bold flex items-center lg:ml-2.5">
          <span class="self-center whitespace-nowrap text-primary">SchoolDMS</span>
        </a>
      </div>
      <div class="flex items-center">
        <!-- Profile menu -->
        <div class="relative ml-3" *ngIf="authState.currentUser$ | async as user">
          <div>
            <button type="button" (click)="toggleProfileMenu()" class="flex text-sm bg-gray-800 rounded-full focus:ring-4 focus:ring-gray-300" id="user-menu-button-2">
              <span class="sr-only">Open user menu</span>
              <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                {{ user.firstName[0] }}{{ user.lastName[0] }}
              </div>
            </button>
          </div>
          <!-- Dropdown menu -->
          <div *ngIf="isProfileMenuOpen" class="z-50 absolute right-0 mt-2 text-base list-none bg-white divide-y divide-gray-100 rounded shadow w-44">
            <div class="px-4 py-3">
              <p class="text-sm text-gray-900">{{ user.firstName }} {{ user.lastName }}</p>
              <p class="text-sm font-medium text-gray-900 truncate">{{ user.email }}</p>
            </div>
            <ul class="py-1">
              <li>
                <a routerLink="/engineer/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
              </li>
              <li>
                <button (click)="logout()" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Sign out</button>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
